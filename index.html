<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AWS Cloud Club Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #1a0033 0%, #0a0014 40%, #000000 100%);
    color: white;
    overflow-x: hidden;
}

/* Animated glow */
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(155,0,255,0.4), transparent 70%);
    top: -200px;
    left: -200px;
    animation: glowMove 10s infinite alternate ease-in-out;
    z-index: -1;
}

@keyframes glowMove {
    from { transform: translate(0,0); }
    to { transform: translate(200px,200px); }
}

.container {
    max-width: 1100px;
    margin: 60px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 52px;
    background: linear-gradient(90deg, #a855f7, #d946ef);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 60px;
}

/* PODIUM */
.podium {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 70px;
}

.podium-card {
    width: 240px;
    padding: 25px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(168,85,247,0.6);
    text-align: center;
    transition: 0.3s;
}

.podium-card:hover {
    transform: translateY(-10px);
}

.rank-number {
    font-size: 28px;
    color: #d946ef;
}

.player-name {
    font-size: 22px;
    margin-top: 12px;
}

.player-score {
    margin-top: 10px;
    font-size: 18px;
    color: #a855f7;
}

.player-time {
    font-size: 14px;
    opacity: 0.7;
}

/* TOP LIST */
.leaderboard {
    list-style: none;
    padding: 0;
}

.leaderboard li {
    display: flex;
    justify-content: space-between;
    padding: 20px 30px;
    margin-bottom: 18px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(168,85,247,0.3);
    transition: 0.3s;
}

.leaderboard li:hover {
    background: rgba(168,85,247,0.2);
    transform: scale(1.02);
    box-shadow: 0 0 15px rgba(168,85,247,0.7);
}

.rank { width: 60px; color: #d946ef; font-weight: bold; }
.name { flex: 1; }
.score { color: #a855f7; font-weight: bold; }

.footer {
    text-align: center;
    margin-top: 60px;
    opacity: 0.6;
    font-size: 14px;
}

</style>
</head>
<body>

<div class="container">
    <h1>🚀 AWS CLOUD CLUB LEADERBOARD</h1>

    <div class="podium" id="podium"></div>
    <ul id="leaderboard" class="leaderboard"></ul>

    <div class="footer">Ranking by Points ↓ then Time ↑</div>
</div>

<script>

// ✅ IMPORTANT: Use RAW GitHub link (no /edit/)
const csvURL = "https://raw.githubusercontent.com/Anmol-Srivastava-073/leaderboard/main/public/data.csv";

function calculateSeconds(start, end) {
    const startDate = new Date(start);
    const endDate = new Date(end);
    return Math.floor((endDate - startDate) / 1000);
}

function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}m ${s}s`;
}

async function updateLeaderboard() {
    try {
        const response = await fetch(csvURL + "?t=" + new Date().getTime());
        const text = await response.text();

        const rows = text.trim().split("\n").slice(1);

        let players = rows.map(row => {
            const cols = row.split(",");

            const timeTaken = calculateSeconds(cols[2], cols[3]);

            return {
                name: cols[0],
                score: parseInt(cols[1]),
                time: timeTaken
            };
        });

        // Sort by Score DESC, Time ASC
        players.sort((a, b) => {
            if (b.score !== a.score) {
                return b.score - a.score;
            }
            return a.time - b.time;
        });

        const podium = document.getElementById("podium");
        const list = document.getElementById("leaderboard");

        podium.innerHTML = "";
        list.innerHTML = "";

        // Top 3
        players.slice(0,3).forEach((player, i) => {
            const card = document.createElement("div");
            card.className = "podium-card";
            card.innerHTML = `
                <div class="rank-number">#${i+1}</div>
                <div class="player-name">${player.name}</div>
                <div class="player-score">${player.score} pts</div>
                <div class="player-time">${formatTime(player.time)}</div>
            `;
            podium.appendChild(card);
        });

        // 4–10
        players.slice(3,10).forEach((player, i) => {
            const li = document.createElement("li");
            li.innerHTML = `
                <span class="rank">#${i+4}</span>
                <span class="name">${player.name}</span>
                <span class="score">
                    ${player.score} pts • ${formatTime(player.time)}
                </span>
            `;
            list.appendChild(li);
        });

    } catch (err) {
        console.error("Error loading leaderboard:", err);
    }
}

updateLeaderboard();
setInterval(updateLeaderboard, 10000);

</script>

</body>
</html>
