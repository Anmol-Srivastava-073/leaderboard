<!DOCTYPE html>
<html>
<head>
<title>AWS Cloud Quiz Leaderboard</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 700px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.leaderboard {
    list-style: none;
    padding: 0;
}

.leaderboard li {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    margin-bottom: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease;
}

.leaderboard li:hover {
    transform: scale(1.03);
}

.rank {
    font-weight: bold;
    width: 50px;
}

.name {
    flex: 1;
}

.score {
    font-weight: bold;
}

.gold { background: linear-gradient(90deg, #FFD700, #FFB300); color: black; }
.silver { background: linear-gradient(90deg, #C0C0C0, #A9A9A9); color: black; }
.bronze { background: linear-gradient(90deg, #CD7F32, #B87333); color: black; }

</style>
</head>
<body>

<div class="container">
    <h1>🏆 AWS Cloud Quiz – Top 10</h1>
    <ul class="leaderboard">
        <li class="gold"><span class="rank">1</span><span class="name">Anmol</span><span class="score">95</span></li>
        <li class="silver"><span class="rank">2</span><span class="name">Riya</span><span class="score">92</span></li>
        <li class="bronze"><span class="rank">3</span><span class="name">Arjun</span><span class="score">90</span></li>
        <li><span class="rank">4</span><span class="name">Priya</span><span class="score">88</span></li>
        <li><span class="rank">5</span><span class="name">Kunal</span><span class="score">85</span></li>
        <li><span class="rank">6</span><span class="name">Meera</span><span class="score">82</span></li>
        <li><span class="rank">7</span><span class="name">Rahul</span><span class="score">80</span></li>
        <li><span class="rank">8</span><span class="name">Sneha</span><span class="score">78</span></li>
        <li><span class="rank">9</span><span class="name">Vikram</span><span class="score">75</span></li>
        <li><span class="rank">10</span><span class="name">Ishita</span><span class="score">72</span></li>
    </ul>
</div>

</body>
</html>
