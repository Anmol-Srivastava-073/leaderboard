<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Leaderboard</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}
h1 { margin-top: 20px; }
ul { list-style: none; padding: 0; }
li {
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
  margin: 10px;
  padding: 12px;
  font-size: 18px;
  display: flex;
  justify-content: space-between;
}
.gold { background: #ffd700; color: #000; }
.silver { background: #c0c0c0; color: #000; }
.bronze { background: #cd7f32; color: #000; }
</style>
</head>
<body>

<h1>🏆 AWS Cloud Quiz – Top 10</h1>
<ul id="leaderboard"></ul>

<script>
async function updateLeaderboard() {
  try {
    const res = await fetch("/api/leaderboard");
    const data = await res.json();

    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    data.forEach((p, i) => {
      const li = document.createElement("li");
      if (i === 0) li.classList.add("gold");
      if (i === 1) li.classList.add("silver");
      if (i === 2) li.classList.add("bronze");

      li.innerHTML = `<span>${i+1}. ${p.name}</span><span>${p.score}</span>`;
      list.appendChild(li);
    });
  } catch (err) {
    console.error("Leaderboard update failed:", err);
  }
}

updateLeaderboard();
setInterval(updateLeaderboard, 10000);
</script>

</body>
</html>
