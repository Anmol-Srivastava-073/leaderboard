<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AWS Cloud Quiz Leaderboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 800px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 40px;
}

.leaderboard {
    list-style: none;
    padding: 0;
}

.leaderboard li {
    display: flex;
    justify-content: space-between;
    padding: 18px 25px;
    margin-bottom: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease, background 0.2s ease;
}

.leaderboard li:hover {
    transform: scale(1.02);
    background: rgba(255,255,255,0.15);
}

.rank { width: 50px; font-weight: bold; }
.name { flex: 1; }
.score { font-weight: bold; }

.gold { background: linear-gradient(90deg, #FFD700, #FFB300); color: black; }
.silver { background: linear-gradient(90deg, #C0C0C0, #A9A9A9); color: black; }
.bronze { background: linear-gradient(90deg, #CD7F32, #B87333); color: black; }

</style>
</head>
<body>

<div class="container">
    <h1>🏆 AWS Cloud Quiz – Top 10</h1>
    <ul id="leaderboard" class="leaderboard"></ul>
</div>

<script>
async function fetchLeaderboard() {
    const response = await fetch("/api/leaderboard");
    const data = await response.json();

    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    data.forEach((player, index) => {
        const li = document.createElement("li");

        if(index === 0) li.classList.add("gold");
        if(index === 1) li.classList.add("silver");
        if(index === 2) li.classList.add("bronze");

        li.innerHTML = `
            <span class="rank">${index + 1}</span>
            <span class="name">${player.name}</span>
            <span class="score">${player.score}</span>
        `;

        list.appendChild(li);
    });
}

fetchLeaderboard();
setInterval(fetchLeaderboard, 10000); // auto refresh
</script>

</body>
</html>
